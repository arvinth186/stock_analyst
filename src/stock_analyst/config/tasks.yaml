research_news_task:
  description: >
    Search for the latest news, earnings reports, analyst
    ratings, and market sentiment for {company} ({ticker}).
    Focus on last 7 days. Summarize key findings.
  expected_output: >
    A bullet-point summary of 5-7 key news items with
    dates, sources, and sentiment (positive/negative/neutral).
  agent: news_researcher

analyze_financials_task:
  description: >
    Fetch current stock price, 52-week high/low, PE ratio,
    market cap, volume, and 30-day price trend for {ticker}.
    Compare against sector average if possible.
  expected_output: >
    A structured financial snapshot with all metrics
    and a brief trend interpretation (bullish/bearish/neutral).
  agent: financial_analyst

assess_risk_task:
  description: >
    Based on the news summary and financial data for {company},
    identify top 3-5 investment risks. Consider macro factors,
    company-specific risks, and technical signals.
    Write your response as plain text only. Do not use JSON,
    code blocks, or structured data formats.
  expected_output: >
    A plain text risk assessment listing each risk with its name,
    severity (High/Medium/Low), and a brief explanation.
    Format as simple numbered list. No JSON, no code blocks.
  agent: risk_assessor
  context:
    - research_news_task
    - analyze_financials_task

generate_report_task:
  description: >
    Compile all findings into a structured investment brief
    for {company} ({ticker}). Include summary, financials,
    news highlights, risks, and a final recommendation.
    Write as plain prose and markdown only. No JSON or code blocks.
  expected_output: >
    A complete investment brief in plain markdown with sections:
    Executive Summary, Financial Snapshot, News & Sentiment,
    Risk Assessment, and Recommendation (Buy/Hold/Avoid).
    No JSON. No code blocks.
  agent: report_writer
  context:
    - research_news_task
    - analyze_financials_task
    - assess_risk_task